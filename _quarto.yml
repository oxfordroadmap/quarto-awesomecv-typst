project:
  type: website
  output-dir: _site
# CRITICAL: Prevent the website watcher from processing the Typst file
  render:
    - "*.qmd"
    - "!resume.qmd"
  resources:
    - "assets/"
    - "blog/"
    - "slides/"
    - "*.pdf"

website:
  title: "Han-Teng Liao: CV & Blog"
  # Optional: You can add a simple navbar here if you want blog readers 
  # to see a navigation bar, or leave it blank to keep pages clean.
  navbar:
    left:
      - text: "CV"
        href: index.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "Slides"
        href: slides/index.qmd
format:
  html:
    theme: cosmo
    css: styles.css
    toc: true