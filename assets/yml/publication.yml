liao2026_atoms_values:
  title: #link("https://hanteng.sapiens.cv/assets/preprints/2026_ICE-Porto_DCE_Regenerative_Socio_Technical_Roadmap-47-preprint.pdf")[From Stacks to Circuits]: A Regenerative Socio-Technical Roadmap for AI Infrastructure within Planetary Boundaries
  location: ICE IEEE/ITMC, Porto - Portugal
  date: 22-25 June 2026
  description: Conference Paper
  details:
    - Contributors: *Han-Teng Liao*; Karen Ang
    - Challenges Nvidia's "electrons-to-tokens" 5-layer scaling trajectories by converting thermodynamic entropy and Scope 3 metrics into dynamic, regeneratively accountable circuits.
    - Introduces a Regenerative Socio-Technical (RST) Roadmap to address the hidden environmental, thermal, cognitive and material costs of unconstrained Generative AI scaling.
    - (To be) Presented in #strong[Digital Circular Economy] Special Session, providing the conceptual foundation for the #link("https://scvcs.footprints.cv/")[SCVCS] to anchor its *AuditSoS* Pillar through metrology-grounded Digital Product Passports (DPP).
liao2026_ssbd:
  doi: 10.31235/osf.io/yknwt_v1
  title: #link("https://hanteng.sapiens.cv/assets/preprints/2026_ICE_Porto-Semiconductor_SSbD-64a-preprint.pdf")[Scoping Review of AI, Metrology, and ESG in the Semiconductor Sector: Implications for Safe and Sustainable by Design (SSbD)]
  location: ICE IEEE/ITMC, Porto - Portugal
  date: 22-25 June 2026
  description: Conference Paper
  details:
    - Contributors: Karen Ang; *Han-Teng Liao*
    - Proposes a novel 6-layer System of Systems (SoS) architecture to integrate AI-driven metrology, supply chain ESG metrics, and federated industrial data spaces into an integrated architecture.
    - Bridges the gap between precision manufacturing and verifiable environmental sustainability by embedding SSbD as core operational logic for Industry 5.0.
    - (To be) Presented in *Technology* Session, providing the conceptual foundation for the #link("https://scvcs.footprints.cv/")[SCVCS] to integrate RealSoS, GuardSoS and AuditSoS Pillars as a System of Systems(SoS).
liao2026_twin_transition:
  doi: 10.31235/osf.io/ktcxd_v1
  title: #link("https://hanteng.sapiens.cv/assets/preprints/2026_ICE-Porto_GBS_52c-preprint.pdf")[Orchestrating the Twin Transition in Multinational Corporations: Technology Roadmapping for Green and Digital Global Business Services]
  location: ICE IEEE/ITMC, Porto - Portugal
  date: 22-25 June 2026
  description: Conference Paper
  details:
    - Contributors: *Han-Teng Liao*; Karen Ang
    - Synthesizes Technology Roadmapping (TRM) and the ITU innovation toolkit to treat Global Business Services (GBS) units as strategic "operational airlocks."
    - Establishes a socio-technical framework for multinational corporations to harmonize internal digital agility and AI-native transitions with external sustainability mandates.
    - (To be) Presented in *Innovation* Session, providing the conceptual foundation for the #link("https://scvcs.footprints.cv/")[SCVCS] to cross-map carbon border adjustment data aggregation under its *AuditSoS* Pillar for regional GBS 5.0 networks.
liao2023_smart:
  proportion: 8
  title: #link("https://doi.org/10.3389/fevo.2023.1134381")[Smart digital platforms for carbon neutral management and services: Business models based on ITU standards for green digital transformation]
  location: Frontiers in Ecology and Evolution
  date: March 2023
  doi: 10.3389/fevo.2023.1134381
  description: Journal article
  details:
    - Contributors: *Han-Teng Liao*; Chung-Lien Pan; Yuan Zhang
    - Evaluated the architectural gap between ITU green digital transformation standards and China's CPCNMSP policy framework, highlighting the latter's omission of "AI of the environment" (infrastructure footprint tracking).
    - Synthesized these global standards into a specialized multi-sided Platform Canvas designed to capture metrics, curation pathways, and currency mechanisms for data-driven decisions.
    - Modeled an open-innovation business framework featuring targeted engineering design questions to optimize, substitute, and manage greenhouse gas (GHG) emission data for both producer and consumer participant segments.
liao2023_esg:
  proportion: 8
  title: #link("https://doi.org/10.3389/fenvs.2023.1119011")[Collaborating on ESG consulting, reporting, and communicating education: Using partner maps for capability building design]
  location: Frontiers in Environmental Science
  date: March 2023
  doi: 10.3389/fenvs.2023.1119011
  description: Journal article
  details:
    - Contributors: *Han-Teng Liao*; Chung-Lien Pan; Yuan Zhang
    - Applied design science and circular economy frameworks to map the specific data and digital skills required for ESG consulting and reporting.
    - Establishes a collaborative roadmap for universities and industry to build capability for sustainable innovation across disciplines and sectors.
pan2023_resilience:
  proportion: 8
  title: #link("https://doi.org/10.3389/fenvs.2023.1152345")[Knowledge Mapping of Resilience and Human Rights in Supply Chains]
  location: Frontiers in Environmental Science
  date: April 2023
  doi: 10.3389/fenvs.2023.1152345
  description: Journal article
  details:
    - Contributors: Chung-Lien Pan; *Han-Teng Liao* (Corresponding Author); Yuan Zhang 
    - Developed a roadmapping taxonomy to integrate human rights and resilience into supply chain architecture.
    - Provides a governance framework for the Twin Transition, offering strategic tools for risk mitigation and value-based alignment in complex, cross-border industrial ecosystems.
liao2023_ports:
  title: #link("https://doi.org/10.3390/systems11020088")[Knowledge Mapping Analysis of Intelligent Ports: Research Facing Global Value Chain Challenges]
  location: Systems
  date: 2023
  doi: 10.3390/systems11020088
  description: Journal article
  details:
    - Contributors: *Han-Teng Liao*; Tsung-Ming Lo; Chung-Lien Pan
    - Utilized scientometrics and science mapping to analyze the digital transformation of intelligent ports within Global Value Chains (GVC).
    - Identifies technical and governance bottlenecks in open and collaborative innovation, providing a strategic roadmap for port-city digital integration.
zhang2021_neutrality:
  proportion: 8
  title: #link("https://doi.org/10.3389/fenvs.2021.761736")[Carbon neutrality policies and technologies: A scientometric analysis of social science disciplines]
  location: Frontiers in Environmental Science  
  date: October 2021  
  doi: 10.3389/fenvs.2021.761736  
  description: Journal article  
  details:
    - Contributors: Yuan Zhang; Chung-Lien Pan; *Han-Teng Liao*    
    - Conducted a comprehensive science mapping and systematic review of 907 social science articles to delineate disciplinary boundaries and collaborative frameworks for net-zero pathways.    - Highlighted the critical intersection where green digital transformation and datafied environmental indicators must guide human production and consumption patterns.
liao2020_museums:
  proportion: 7
  title: #link("https://doi.org/10.2991/assehr.k.200428.101")[A Literature Review of Museum and Heritage on Digitization, Digitalization, and Digital Transformation]
  location: International Conference on Humanities and Social Science Research (ICHSSR 2020)  
  date: May 2020  
  doi: 10.2991/assehr.k.200428.101  
  description: Conference paper  
  details:
    - Contributors: *Han-Teng Liao*; Man Zhao; Si-Pan Sun    
    - Executed a scientometric analysis of 1,107 Web of Science articles using VOSviewer and custom Python scripts to categorize distinct layers of socio-technical transitions.    - Mapped the shift in cultural institution research fronts from technology-centric concerns to people-centric concerns (digital literacy, organizational adaptation).
liao2009_wikipedia:
  proportion: 7
  title: #link("https://doi.org/10.1109/MTS.2009.932799")[Conflict and consensus in the Chinese version of Wikipedia]
  location: IEEE Technology and Society Magazine  
  date: June 2009  
  doi: 10.1109/MTS.2009.932799  
  description: Journal article  
  details:
    - Contributors: *Han-Teng Liao*    
    - Investigated the socio-technical architectures, editorial policy alignments, and hyperlinked structures used to govern consensus in high-conflict, cross-border digital environments.    - Analyzed how political and cultural cybernetics operate when collaborative web spaces cross sensitive jurisdictional and ideological boundaries.
