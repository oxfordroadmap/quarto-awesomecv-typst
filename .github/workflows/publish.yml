on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish
env:
  RENV_PATHS_ROOT: ~/.cache/R/renv

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      
      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Render Quarto
        run: quarto render

      # FIX 2: Ensure your custom root redirection isn't overwritten by GitHub Pages
      - name: Create fallback index for root redirection (Optional but Recommended)
        run: |
          if [ ! -f _site/index.html ]; then
            echo '<meta http-equiv="refresh" content="0; URL='\''/resume.pdf'\''" />' > _site/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          cname: hanteng.sapiens.cv